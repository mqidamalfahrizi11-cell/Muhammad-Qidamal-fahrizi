<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Tag head dan title -->
    <meta charset="UTF-8">
    <title>Tugas Tag HTML Dasar</title>
</head>
<body>
    <!-- Tag h1 sampai h6 -->
    <h1>Tag-Tag dalam HTML</h1>
    <p>Belajar beberapa tag dasar dalam HTML</p>

    <!-- Tag hr untuk garis horizontal -->
    <hr>

    <h2>Contoh dan Fungsi setiap tag</h2>
    
    <!-- Contoh tag p, b, i, dan u -->
    <p>1. Ini adalah contoh <b>Teks Bold (Tebal)</b></p>
    <p>2. Ini adalah contoh <i>Teks Italic (Miring)</i></p>
    <p>3. Ini adalah contoh <u>Teks Underline (Garis Bawah)</u></p>

    <hr>

    <h2>Sedikit Contoh dan Fungsi Atribut</h2>
    
    <!-- Contoh tag label (atribut for) dan input (atribut type, id, name, placeholder) -->
    <form>
        <label for="nama_user">Nama Lengkap:</label><br>
        <input type="text" id="nama_user" name="nama" placeholder="Masukkan nama Anda...">
        
        <br><br>
        
        <!-- Contoh tag button -->
        <button type="button">Kirim Data</button>
    </form>

    <br>

    <!-- Contoh simbol copyright -->
    <footer>
        <p>&copy; 2024 Portofolio Saya</p>
    </footer>

</body>
</html>
